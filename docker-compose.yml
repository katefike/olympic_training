# Run this compose for local development. 
services:
  db:
    image: postgres:14.4
    container_name: olympic-training-db
    restart: always
    env_file:
      - .env-example
    ports:
      - '5432:5432'
    logging:
      options:
        max-size: 10m
        max-file: "3"
    volumes: 
      - ./docker/db/init:/docker-entrypoint-initdb.d
      - db:/var/lib/postgresql/data
  grafana:
    image: grafana/grafana-oss
    container_name: olympic-training-grafana
    restart: unless-stopped
    env_file:
      - .env-example
    ports:
     - '3000:3000'
    volumes:
      - ./docker/grafana/grafana_dev.ini:/etc/grafana/grafana.ini
      - ./docker/grafana/provisioning/postgres.yml:/etc/grafana/provisioning/datasources/postgres.yml
      - ./docker/grafana/provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
  api:
    image: python:3.12-slim
    container_name: olympic-training-api
    restart: unless-stopped
    env_file:
      - .env-example
    working_dir: /app
    command: bash -lc "pip install --no-cache-dir -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    depends_on:
      - db
  nginx:
    image: nginx:latest
    container_name: olympic-training-nginx
    restart: always
    env_file:
      - .env-example
    ports:
      - '8080:80'
    volumes:
      - ./docker/nginx/dev:/etc/nginx/conf.d
volumes:
  db:
    driver: local