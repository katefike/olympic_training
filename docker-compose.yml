# Run this compose for local development. 
services:
  db:
    image: postgres:14.4
    container_name: db
    restart: always
    env_file:
      - .env-example
    ports:
      - '5432:5432'
    logging:
      options:
        max-size: 10m
        max-file: "3"
    volumes: 
      - ./docker/db/init:/docker-entrypoint-initdb.d
      - db:/var/lib/postgresql/data
  grafana:
    image: grafana/grafana-oss
    container_name: grafana
    restart: unless-stopped
    env_file:
      - .env-example
    ports:
     - '3000:3000'
    volumes:
      - ./docker/grafana/grafana_dev.ini:/etc/grafana/grafana.ini
      - ./docker/grafana/provisioning/postgres.yml:/etc/grafana/provisioning/datasources/postgres.yml
      - ./docker/grafana/provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
  nginx:
    image: nginx:latest
    container_name: olympic-training-nginx
    restart: always
    env_file:
      - .env-example
    ports:
      - '8080:80'
    volumes:
      - ./docker/nginx/dev:/etc/nginx/conf.d
volumes:
  db:
    driver: local